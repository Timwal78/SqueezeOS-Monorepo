startCommand:
  type: stdio
  command: python
  args:
    - backend/mcp_server_sml.py
  cwd: "."

configSchema:
  type: object
  properties:
    anthropic_api_key:
      type: string
      description: "Anthropic API key for AI counsel verdicts (optional — signals work without it)"
    discord_webhook:
      type: string
      description: "Discord webhook URL for order alerts and signal notifications (optional)"
    paper_mode:
      type: boolean
      default: true
      description: "Paper mode — simulate fills without real execution (recommended for testing)"
    robinhood_paper_mode:
      type: boolean
      default: true
      description: "Robinhood MCP paper mode flag"
    pdt_shield_enabled:
      type: boolean
      default: false
      description: "PDT shield (eliminated 2026-06-04 — keep false unless reinstated)"
    x402_enforce:
      type: boolean
      default: false
      description: "Enforce RLUSD payment for premium endpoints (disable for local/dev use)"
  required: []

